<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Swap Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="skeleton-page">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="skeleton logo"></div>

        <div class="nav-links">
            <div class="skeleton nav-item"></div>
            <div class="skeleton nav-item"></div>
            <div class="skeleton nav-item"></div>
            <div class="skeleton nav-item"></div>
            <div class="skeleton nav-item"></div>
        </div>

        <div class="nav-buttons">
            <div class="skeleton login-btn"></div>
            <div class="skeleton join-btn"></div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">

        <!-- Left Cards -->
        <div class="left-skills">
            <div class="skeleton skill-card"></div>
            <div class="skeleton skill-card"></div>
        </div>

        <!-- Center Content -->
        <div class="hero-content">

            <div class="skeleton badge"></div>

            <div class="skeleton title-line"></div>
            <div class="skeleton title-line large"></div>
            <div class="skeleton title-line"></div>

            <div class="skeleton text-line"></div>
            <div class="skeleton text-line small"></div>

            <div class="hero-buttons">
                <div class="skeleton btn-primary"></div>
                <div class="skeleton btn-secondary"></div>
            </div>

        </div>

        <!-- Right Cards -->
        <div class="right-skills">
            <div class="skeleton skill-card"></div>
            <div class="skeleton skill-card"></div>
        </div>

    </section>

    <!-- Footer Skeleton -->
    <footer class="footer">

        <div class="footer-top">
            <div class="skeleton footer-logo"></div>

            <div class="footer-links">
                <div class="skeleton footer-link"></div>
                <div class="skeleton footer-link"></div>
                <div class="skeleton footer-link"></div>
                <div class="skeleton footer-link"></div>
            </div>
        </div>

        <div class="footer-social">
            <div class="skeleton social"></div>
            <div class="skeleton social"></div>
            <div class="skeleton social"></div>
            <div class="skeleton social"></div>
        </div>

        <div class="skeleton copyright"></div>

    </footer>

</div>

</body>
</html>
