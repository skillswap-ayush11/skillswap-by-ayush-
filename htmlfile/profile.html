<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Swap - your profile</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="../cssfile/navbar.css">
  <link rel="stylesheet" href="../cssfile/profile.css">
  <link rel="stylesheet" href="../cssfile/footer.css">
  <link rel="icon" type="image/png" href="sslogo.png" />
</head>

<body>
  

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <i class="fa-solid fa-link"></i>
      <h1>Skill <span>Swap</span></h1>
    </div>

    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="explore_skills.html">Explore</a>
      <a href="community.html">Community</a>
      <a href="aboutit.html">About it</a>
      <a href="howitworks.html">How it works</a>
    </div>

    <div class="nav-btns">
      <a href="login.html" id="loginBtn"class="login-btn">
        <i class="fa-regular fa-user"></i> Login
      </a>
      <a href="sign.html" id="joinBtn"class="join-btn">
        🚀 Join Now
      </a>
       <div id="userInfo" style="display:none;"></div>
    </div>
  </nav>

<div class="profile-container">

  <!-- PROFILE HEADER -->
  <div class="profile-header">

    <div class="profile-left">

      <div class="profile-image-wrapper">

        <img
          id="profileImage"
          src="https://via.placeholder.com/150"
          alt="Profile"
        >

        <input
          type="file"
          id="imageUpload"
          hidden
        >

        <button onclick="document.getElementById('imageUpload').click()">
          Change Photo
        </button>

      </div>

      <div class="profile-info">

        <input id="name" type="text" placeholder="Full Name">

        <textarea
          id="bio"
          placeholder="Tell others about yourself..."
        ></textarea>

      </div>

    </div>

    <button class="save-btn">
      Save Profile
    </button>

  </div>

  <!-- DETAILS -->
  <div class="profile-grid">

    <div class="card">
      <h2>Location</h2>

      <input id="country" placeholder="Country">
      <input id="state" placeholder="State">
      <input id="city" placeholder="City">
      <input id="address" placeholder="Address">
    </div>

    <div class="card">
      <h2>Contact</h2>

      <input id="phone" placeholder="Phone">

      <input id="github" placeholder="GitHub">

      <input id="linkedin" placeholder="LinkedIn">

      <input id="portfolio" placeholder="Portfolio">
    </div>

    <div class="card">
      <h2>Skills I Can Teach</h2>

      <textarea
        id="teachSkills"
        placeholder="HTML,CSS,JavaScript"
      ></textarea>
    </div>

    <div class="card">
      <h2>Skills I Want To Learn</h2>

      <textarea
        id="learnSkills"
        placeholder="Node.js,MongoDB"
      ></textarea>
    </div>

    <div class="card">
      <h2>Languages</h2>

      <input
        id="languages"
        placeholder="English,Hindi"
      >
    </div>

    <div class="card">
      <h2>Availability</h2>

      <input
        id="availability"
        placeholder="Mon-Fri 7PM-10PM"
      >
    </div>
    <div class="about-image">
    <img src="../htmlfile/profile1.svg" alt="SkillSwap">
</div>

  </div>

</div>
