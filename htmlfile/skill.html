<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Selection</title>

<link rel="stylesheet" href="../cssfile/skill.css">
<link rel="stylesheet"  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="../cssfile/navbar.css" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="sslogo.png" />
</head>
<body>

<div class="container">

    <div class="heading">
        <h1>Build Your Skill Profile</h1>
        <p>Select skills you can teach and skills you want to learn.</p>
    </div>

    <div class="skill-wrapper">

        <!-- Teach Skills -->
        <div class="card">
            <h2>🎓 Skills You Can Teach</h2>

            <div class="skills">
                <button class="skill">HTML</button>
                <button class="skill">CSS</button>
                <button class="skill">JavaScript</button>
                <button class="skill">Python</button>
                <button class="skill">Java</button>
                <button class="skill">Graphic Design</button>
                <button class="skill">Video Editing</button>
                <button class="skill">Public Speaking</button>
                <button class="skill">Photography</button>
                <button class="skill">Marketing</button>
            </div>
        </div>

        <!-- Learn Skills -->
        <div class="card">
            <h2>🚀 Skills You Want To Learn</h2>

            <div class="skills">
                <button class="skill">React</button>
                <button class="skill">Node.js</button>
                <button class="skill">AI</button>
                <button class="skill">Cyber Security</button>
                <button class="skill">C++</button>
                <button class="skill">UI/UX</button>
                <button class="skill">Data Science</button>
                <button class="skill">Machine Learning</button>
                <button class="skill">Android Dev</button>
                <button class="skill">Cloud Computing</button>
            </div>
        </div>

    </div>

    <div class="level-card">
        <h2>Your Experience Level</h2>

        <div class="levels">
            <label>
                <input type="radio" name="level">
                Beginner
            </label>

            <label>
                <input type="radio" name="level">
                Intermediate
            </label>

            <label>
                <input type="radio" name="level" checked>
                Advanced
            </label>
        </div>
    </div>

    <button class="continue-btn">
        Continue →
    </button>

    <!-- NAVBAR -->

<nav class="navbar">

    <!-- LOGO -->
    <div class="logo">
        <i class="fa-solid fa-link"></i>
        <h1>Skill <span>Swap</span></h1>
    </div>

    <!-- NAV LINKS -->
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="explore skills.html">Explore</a>
        <a href="community.html">Community</a>
        <a href="aboutit.html">About it</a>
        <a href="how-it-works.html">How it works</a>
    </div>

    <!-- BUTTONS -->
    <div class="nav-btns">

        <a href="#" class="login-btn">
            <i class="fa-regular fa-user"></i> Login
        </a>

        <a href="#" class="join-btn">
            🚀 Join Now
        </a>

    </div>

</nav>
</div>
<script>
const teachSkills = document.querySelectorAll(".teach-skill");
const learnSkills = document.querySelectorAll(".learn-skill");

teachSkills.forEach(skill => {
    skill.addEventListener("click", () => {

        const skillName = skill.dataset.skill;

        // remove from learn section
        document.querySelectorAll(".learn-skill").forEach(item => {
            if(item.dataset.skill === skillName){
                item.classList.remove("active");
            }
        });

        skill.classList.toggle("active");
    });
});

learnSkills.forEach(skill => {
    skill.addEventListener("click", () => {

        const skillName = skill.dataset.skill;

        // remove from teach section
        document.querySelectorAll(".teach-skill").forEach(item => {
            if(item.dataset.skill === skillName){
                item.classList.remove("active");
            }
        });

        skill.classList.toggle("active");
    });
});
</script>
</body>
</html>
