<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Swap - Explore Skills</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="../cssfile/navbar.css">
  <link rel="stylesheet" href="../cssfile/explore_skills.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <i class="fa-solid fa-link"></i>
      <h1>Skill <span>Swap</span></h1>
    </div>

    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="explore_skills.html">Explore</a>
      <a href="community.html">Community</a>
      <a href="aboutit.html">About it</a>
      <a href="how-it-works.html">How it works</a>
    </div>

    <div class="nav-btns">
      <a href="login.html" class="login-btn">
        <i class="fa-regular fa-user"></i> Login
      </a>
      <a href="sign.html" class="join-btn">
        🚀 Join Now
      </a>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="explore-wrapper">

    <!-- HERO -->
    <div class="explore-hero">
      <h1>Explore <span>Skills</span></h1>
      <p>Discover what people are teaching and learning around the world</p>

      <!-- SEARCH -->
      <div class="search-bar">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search skills, topics, or people...">
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <button class="filter-btn active" data-category="All">All</button>
      <button class="filter-btn" data-category="Technology">💻 Technology</button>
      <button class="filter-btn" data-category="Design">🎨 Design</button>
      <button class="filter-btn" data-category="Music">🎵 Music</button>
      <button class="filter-btn" data-category="Language">🌍 Language</button>
      <button class="filter-btn" data-category="Business">💼 Business</button>
      <button class="filter-btn" data-category="Art">🖌️ Art</button>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stat-item"><span id="skillCount">0</span> Skills Available</div>
      <div class="stat-item">🔥 Updated Live</div>
    </div>

    <!-- SKILLS GRID -->
    <div class="skills-grid" id="skillsGrid">
      <!-- loaded dynamically -->
    </div>

  </div>

 <script src="backend/explore.js" defer></script>
<script src="backend/home.js" defer></script>

</body>
</html>
